<div class="card">
  <div class="card-header">
    <div class="icon-wrap">🚢</div>
    <h1>Shipment Tracking</h1>
    <p class="subtitle">Enter an MBL# / Container#, then pick its carrier to track</p>
  </div>

  <div class="card-body">
    <label class="field-label" for="mblno-input">MBL# / Container#</label>
    <div class="input-wrapper">
      <input id="mblno-input" type="text" [(ngModel)]="mblno" (input)="mblno = mblno.toUpperCase()" class="text-input"
        placeholder="e.g. MEDUX3434332739 " autocomplete="off" spellcheck="false" />
      @if (mblno) {
      <button class="clear-btn" (click)="mblno = ''" title="Clear">✕</button>
      }
    </div>

    <div class="carriers">
      <span class="carriers-label">Choose carrier <span class="carriers-hint">(click to track)</span></span>
      <div class="carriers-grid">
        @for (c of carriers; track c.scac) {
        <button type="button" class="carrier-chip" (click)="trackWithCarrier(c)" [title]="c.scac">{{ c.name }}</button>
        }
      </div>
    </div>

    @if (statusMessage) {
    <div class="status-banner" [class.success]="statusType === 'success'" [class.error]="statusType === 'error'">
      {{ statusType === 'success' ? '✓' : '✕' }} {{ statusMessage }}
    </div>
    }
  </div>

  <div class="card-footer">
    <span>Powered by Chrome Extension</span>
  </div>
</div>
